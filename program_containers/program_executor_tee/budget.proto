syntax = "proto3";

package confidential_federated_compute.program_executor_tee;

// BudgetState represents the budget maintained by the program executor
// containers for a given logical pipeline name.
message BudgetState {
  // A strictly increasing counter to ensure that the state changes between
  // releases.
  uint32 counter = 2;
  // A recovery info blob id. Recovery is permitted from the corresponding
  // recovery info value as well as any more recent recovery info values that
  // can be traced back to this one. If a program supports recovery,
  // unencrypted results should always be released in conjunction with an
  // update to this value in order to prevent replay attacks. If a program
  // does not support recovery, this field will not be set.
  optional bytes recovery_blob_id = 3;

  reserved 1;
}

// RecoveryInfo contains information about a recovery value.
message RecoveryInfo {
  // The recovery value, which may contain arbitrary recovery information as
  // configured by the program.
  bytes value = 1;
  // The last recovery info blob id stored in BudgetState committed to KMS.
  // If no BudgetState has been committed to KMS yet, this field will not be
  // set.
  optional bytes committed_blob_id = 2;
}
