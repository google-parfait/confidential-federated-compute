syntax = "proto3";

package confidential_federated_compute.fed_sql;

import "google/protobuf/timestamp.proto";

// Used to serialize the state of RangeTracker and pass it between containers.
// This state is never persisted.
message RangeTrackerState {
  // Tracked keys.
  repeated bytes keys = 4;

  // Tracked ranges represented as a list consisting of range_start and
  // range_end values.
  repeated fixed64 values = 5;

  // The index of the partition that this RangeTracker is tracking.
  uint64 partition_index = 2;

  // Keys that have expired and should be removed from the budget.
  repeated bytes expired_keys = 3;

  // The start and end time of the aggregation window.
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;

  reserved 1;
}
