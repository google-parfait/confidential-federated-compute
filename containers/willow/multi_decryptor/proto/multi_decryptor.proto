syntax = "proto3";

package apps.willow.multi_decryptor.service;

import "proto/willow_committee_selector.proto";
import "proto/willow_reputable_decryptor.proto";

message MultiDecryptorRequest {
  oneof msg {
    apps.willow.committee_selector.service.CommitteeSelectorRequest committee_selector = 1;
    apps.willow.reputable_decryptor.service.ReputableDecryptorRequest reputable_decryptor = 2;
  }
}

message MultiDecryptorResponse {
  oneof msg {
    apps.willow.committee_selector.service.CommitteeSelectorResponse committee_selector = 1;
    apps.willow.reputable_decryptor.service.ReputableDecryptorResponse reputable_decryptor = 2;
  }
}

message MultiDecryptorEvent {
  oneof event {
    apps.willow.committee_selector.service.CommitteeSelectorEvent committee_selector = 1;
    apps.willow.reputable_decryptor.service.ReputableDecryptorEvent reputable_decryptor = 2;
  }
}

message MultiDecryptorSnapshot {
  bytes committee_selector = 1;
  bytes reputable_decryptor = 2;
}

message MultiDecryptorConfig {
  int32 max_number_of_committees = 1;
  int32 max_number_of_decryptors = 2;
  int32 max_number_of_keys = 3;
}

